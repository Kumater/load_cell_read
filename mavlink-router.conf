# mavlink-router configuration
# Place this at /etc/mavlink-router/main.conf on the Pi
#
# mavlink-router owns /dev/ttyAMA0 exclusively.
# Both MAVSDK and pymavlink connect via UDP — no serial port conflicts.
#
# Install:  sudo apt install mavlink-router
# Run:      mavlink-routerd -c /etc/mavlink-router/main.conf
# Autostart: sudo systemctl enable mavlink-router

[UartEndpoint FC]
Device = /dev/ttyAMA0
Baud = 500000

# MAVSDK connects here  →  px4Address = "udp://:14540"
[UdpEndpoint MAVSDK]
Mode = Server
Address = 127.0.0.1
Port = 14540

# pymavlink connects here  →  mavlink_udp = "udp:127.0.0.1:14541"
[UdpEndpoint pymavlink]
Mode = Server
Address = 127.0.0.1
Port = 14541
